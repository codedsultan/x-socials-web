name: X-Socials-Web CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Type check
        run: npx tsc --noEmit 
      
      - name: Lint
        run: pnpm lint  
      
      - name: Build
        run: pnpm build  
      
      # TODO: Add Skip Jest and PlayrightE2E